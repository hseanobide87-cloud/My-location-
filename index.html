<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HusseinMod | Pro Edition</title>
    <style>
        :root {
            --main-color: #007bff;
            --card-bg: rgba(10, 10, 10, 0.95);
            --text-main: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.9);
            --danger-color: #ff4d4d;
            --admin-color: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh;
            background: black url('cristiano.png') no-repeat center center fixed;
            background-size: cover; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); z-index: 0;
        }

        /* القائمة العلوية */
        .navbar {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-bg); display: none;
            justify-content: center; padding: 15px 0;
            z-index: 10; border-bottom: 2px solid var(--main-color);
        }

        .nav-link { color: white; margin: 0 15px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }

        .container { position: relative; z-index: 1; width: 95%; max-width: 1100px; margin-top: 100px; }

        /* واجهات الدخول والـ PIN */
        #login-screen, .pin-modal {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            border: 1px solid var(--main-color); text-align: center;
            width: 320px; margin: 80px auto; backdrop-filter: blur(15px);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* البحث والسكربتات */
        #search-box {
            width: 100%; max-width: 500px; margin: 0 auto 30px auto;
            display: block; padding: 12px; border-radius: 25px;
            border: 1px solid var(--main-color); background: rgba(0,0,0,0.6);
            color: white; text-align: center; outline: none;
        }

        .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .script-card {
            background: var(--card-bg); border-radius: 15px; border: 1px solid #333;
            overflow: hidden; text-align: center; padding-bottom: 15px;
        }
        .script-img { width: 100%; height: 150px; object-fit: cover; }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: #111; border: 1px solid #444;
            color: #fff; border-radius: 8px; box-sizing: border-box;
        }

        button {
            background: var(--main-color); color: white; border: none;
            padding: 12px; cursor: pointer; font-weight: bold; border-radius: 8px; width: 100%;
        }

        /* الإحصائيات وسجل الإدارة */
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid var(--admin-color); text-align: center; }
        
        .pin-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .p-btn { background: #222; border: 1px solid #444; padding: 15px; font-size: 20px; border-radius: 8px; }
        
        .action-btns { display: flex; gap: 10px; padding: 10px; }
        .copy-btn { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); }
        .del-btn { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="login-screen" style="display: none;">
        <h2 style="color:var(--main-color)">🔱 HusseinMod 🔱</h2>
        <input type="text" id="reg-name" placeholder="الاسم المستعار">
        <input type="email" id="reg-email" placeholder="الجيميل (Gmail)">
        <input type="password" id="reg-pass" placeholder="كلمة السر">
        <button onclick="userLogin()">دخول النظام</button>
    </div>

    <div id="pin-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100;">
        <div class="pin-modal">
            <h3 style="color:var(--admin-color)">رمز الأمان (PIN)</h3>
            <input type="password" id="pin-display" readonly style="text-align:center; font-size:24px; letter-spacing:5px;">
            <div class="pin-btns">
                <button class="p-btn" onclick="addPin('1')">1</button>
                <button class="p-btn" onclick="addPin('2')">2</button>
                <button class="p-btn" onclick="addPin('3')">3</button>
                <button class="p-btn" onclick="addPin('4')">4</button>
                <button class="p-btn" onclick="addPin('5')">5</button>
                <button class="p-btn" onclick="addPin('6')">6</button>
                <button class="p-btn" onclick="addPin('7')">7</button>
                <button class="p-btn" onclick="addPin('8')">8</button>
                <button class="p-btn" onclick="addPin('9')">9</button>
                <button class="p-btn" style="background:var(--danger-color)" onclick="clearPin()">C</button>
                <button class="p-btn" onclick="addPin('0')">0</button>
                <button class="p-btn" style="background:green" onclick="verifyPin()">✔</button>
            </div>
            <button onclick="closePin()" style="margin-top:10px; background:none; border:1px solid #333;">إلغاء</button>
        </div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-link" onclick="showPage('home')">الرئيسية</div>
        <div class="nav-link" onclick="showPage('publish')">نشر سكربت</div>
        <div class="nav-link" id="admin-btn" onclick="openPinModal()" style="color: var(--admin-color); display:none;">الإدارة 👑</div>
        <div class="nav-link" onclick="logout()" style="color: var(--danger-color);">خروج</div>
    </nav>

    <div class="container">
        <div id="home" class="page">
            <input type="text" id="search-box" placeholder="🔍 ابحث عن سكربت (Roblox, PUBG...)" onkeyup="searchScripts()">
            <div id="scripts-list" class="scripts-grid"></div>
        </div>

        <div id="publish" class="page">
            <div style="max-width:500px; margin:auto; background:var(--card-bg); padding:25px; border-radius:20px; border:1px solid var(--main-color)">
                <h2 style="text-align:center; margin-top:0;">نشر سكربت جديد</h2>
                <input type="text" id="s-title" placeholder="عنوان السكربت">
                <input type="file" id="s-file" accept="image/*">
                <textarea id="s-content" rows="6" placeholder="الصق كود السكربت هنا..."></textarea>
                <button onclick="handlePublish()">نشر الآن</button>
            </div>
        </div>

        <div id="admin-page" class="page">
            <h2 style="text-align:center; color:var(--admin-color)">لوحة تحكم المسؤول 👑</h2>
            <div class="stats-grid">
                <div class="stat-card">المستخدمين: <h2 id="stat-u">0</h2></div>
                <div class="stat-card">السكربتات: <h2 id="stat-s">0</h2></div>
            </div>
            <div style="background:var(--card-bg); padding:15px; border-radius:15px; border:1px solid #333; font-size: 13px;">
                <h3 style="margin-top:0;">سجل الدخول:</h3>
                <div id="logs-area"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PIN = "2026"; // رمز الـ PIN الخاص بك يا حسين
        let scripts = JSON.parse(localStorage.getItem('myScripts')) || [];
        let logs = JSON.parse(localStorage.getItem('userLogs')) || [];

        // 1. فحص حالة الدخول عند تحميل الصفحة
        function checkLoginStatus() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                if(localStorage.getItem('currentUserName').toLowerCase() === 'hussein') {
                    document.getElementById('admin-btn').style.display = 'block';
                }
                showPage('home');
                loadScripts();
            } else {
                document.getElementById('login-screen').style.display = 'block';
            }
        }

        // 2. تسجيل دخول جديد
        function userLogin() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(name && email && pass) {
                logs.push({ name, email, pass, time: new Date().toLocaleString() });
                localStorage.setItem('userLogs', JSON.stringify(logs));
                
                // حفظ الجلسة
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUserName', name);
                
                checkLoginStatus();
            } else { alert("أكمل البيانات!"); }
        }

        // 3. الخروج
        function logout() {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUserName');
                location.reload();
            }
        }

        // إدارة السكربتات
        function handlePublish() {
            const title = document.getElementById('s-title').value;
            const code = document.getElementById('s-content').value;
            const file = document.getElementById('s-file').files[0];
            if(!title || !code) return alert("أكمل البيانات!");

            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => saveAndShow(title, code, e.target.result);
                reader.readAsDataURL(file);
            } else { saveAndShow(title, code, ""); }
        }

        function saveAndShow(t, c, i) {
            scripts.push({title: t, code: c, img: i});
            localStorage.setItem('myScripts', JSON.stringify(scripts));
            alert("✅ تم!");
            showPage('home');
            loadScripts();
        }

        function loadScripts() {
            const list = document.getElementById('scripts-list');
            list.innerHTML = scripts.map((s, i) => `
                <div class="script-card">
                    <img src="${s.img || 'https://via.placeholder.com/150'}" class="script-img">
                    <h3>${s.title}</h3>
                    <div class="action-btns">
                        <button class="copy-btn" onclick="copyCode('${s.code}')">نسخ</button>
                        <button class="del-btn" onclick="deleteScript(${i})">حذف</button>
                    </div>
                </div>`).join('');
        }

        function searchScripts() {
            const term = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.script-card').forEach(card => {
                card.style.display = card.querySelector('h3').innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }

        function deleteScript(index) {
            if(confirm("حذف؟")) { scripts.splice(index, 1); localStorage.setItem('myScripts', JSON.stringify(scripts)); loadScripts(); }
        }

        // نظام الـ PIN والمسؤول
        let enteredPin = "";
        function openPinModal() { document.getElementById('pin-modal-overlay').style.display = 'block'; }
        function closePin() { document.getElementById('pin-modal-overlay').style.display = 'none'; enteredPin = ""; document.getElementById('pin-display').value = ""; }
        function addPin(n) { enteredPin += n; document.getElementById('pin-display').value = enteredPin; }
        function verifyPin() {
            if(enteredPin === ADMIN_PIN) { closePin(); showPage('admin-page'); updateAdminUI(); }
            else { alert("رمز خاطئ!"); enteredPin = ""; document.getElementById('pin-display').value = ""; }
        }

        function updateAdminUI() {
            document.getElementById('stat-u').innerText = logs.length;
            document.getElementById('stat-s').innerText = scripts.length;
            document.getElementById('logs-area').innerHTML = logs.map(l => `<div>👤 ${l.name} | 🔑 ${l.pass} | 📅 ${l.time}</div><hr>`).reverse().join('');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function copyCode(text) { navigator.clipboard.writeText(text); alert("✅ تم النسخ!"); }
    </script>
</body>
</html>
