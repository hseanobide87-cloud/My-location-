<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>script HUB</title>
    <style>
        :root {
            --main-color: #007bff;
            --card-bg: rgba(15, 15, 15, 0.95);
            --text-main: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.9);
            --danger-color: #ff4d4d;
            --admin-color: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh;
            background: black url('cristiano.png') no-repeat center center fixed;
            background-size: cover; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); z-index: 0;
        }

        .navbar {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-bg); display: none;
            justify-content: center; padding: 15px 0;
            z-index: 10; border-bottom: 2px solid var(--main-color);
        }

        .nav-link { color: white; margin: 0 15px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }
        .container { position: relative; z-index: 1; width: 95%; max-width: 1100px; margin-top: 100px; }

        #login-screen, .pin-modal {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            border: 1px solid var(--main-color); text-align: center;
            width: 320px; margin: 80px auto; backdrop-filter: blur(15px);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #search-box {
            width: 100%; max-width: 500px; margin: 0 auto 30px auto;
            display: block; padding: 12px; border-radius: 25px;
            border: 1px solid var(--main-color); background: rgba(0,0,0,0.6);
            color: white; text-align: center; outline: none;
        }

        .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .script-card {
            background: var(--card-bg); border-radius: 15px; border: 1px solid #333;
            overflow: hidden; text-align: center; padding-bottom: 15px; position: relative;
        }

        .author-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--main-color); color: white;
            padding: 3px 10px; border-radius: 10px; font-size: 10px;
        }

        .script-img { width: 100%; height: 150px; object-fit: cover; }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: #111; border: 1px solid #444;
            color: #fff; border-radius: 8px; box-sizing: border-box;
        }

        button {
            background: var(--main-color); color: white; border: none;
            padding: 12px; cursor: pointer; font-weight: bold; border-radius: 8px; width: 100%;
        }

        .pin-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .p-btn { background: #222; border: 1px solid #444; padding: 15px; font-size: 20px; border-radius: 8px; color: white; }
        
        .action-btns { display: flex; gap: 10px; padding: 10px; }
        .copy-btn { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); }
        .del-btn { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="login-screen" style="display: none;">
        <h2 style="color:var(--main-color)">🔱 HusseinMod Community 🔱</h2>
        <input type="text" id="reg-name" placeholder="ادخل اسمك المستعار">
        <input type="email" id="reg-email" placeholder="بريدك الإلكتروني">
        <input type="password" id="reg-pass" placeholder="كلمة المرور">
        <button onclick="userLogin()">دخول والمشاركة</button>
    </div>

    <div id="pin-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100;">
        <div class="pin-modal">
            <h3 style="color:var(--admin-color)">تحقق المسؤول</h3>
            <input type="password" id="pin-display" readonly style="text-align:center; font-size:24px; letter-spacing:5px;">
            <div class="pin-btns">
                <button class="p-btn" onclick="addPin('1')">1</button>
                <button class="p-btn" onclick="addPin('2')">2</button>
                <button class="p-btn" onclick="addPin('3')">3</button>
                <button class="p-btn" onclick="addPin('4')">4</button>
                <button class="p-btn" onclick="addPin('5')">5</button>
                <button class="p-btn" onclick="addPin('6')">6</button>
                <button class="p-btn" onclick="addPin('7')">7</button>
                <button class="p-btn" onclick="addPin('8')">8</button>
                <button class="p-btn" onclick="addPin('9')">9</button>
                <button class="p-btn" style="background:var(--danger-color)" onclick="clearPin()">C</button>
                <button class="p-btn" onclick="addPin('0')">0</button>
                <button class="p-btn" style="background:green" onclick="verifyPin()">✔</button>
            </div>
            <button onclick="closePin()" style="margin-top:10px; background:none; border:1px solid #333; color: white;">إلغاء</button>
        </div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-link" onclick="showPage('home')">الرئيسية</div>
        <div class="nav-link" onclick="showPage('publish')">نشر سكربت</div>
        <div class="nav-link" id="admin-btn" onclick="openPinModal()" style="color: var(--admin-color); display:none;">إدارة النظام 👑</div>
        <div class="nav-link" onclick="logout()" style="color: var(--danger-color);">خروج</div>
    </nav>

    <div class="container">
        <div id="home" class="page">
            <input type="text" id="search-box" placeholder="🔍 ابحث عن سكربتات الأعضاء..." onkeyup="searchScripts()">
            <div id="scripts-list" class="scripts-grid"></div>
        </div>

        <div id="publish" class="page">
            <div style="max-width:500px; margin:auto; background:var(--card-bg); padding:25px; border-radius:20px; border:1px solid var(--main-color)">
                <h2 style="text-align:center; margin-top:0;">شارك سكربتك مع الجميع</h2>
                <input type="text" id="s-title" placeholder="اسم السكربت">
                <input type="file" id="s-file" accept="image/*">
                <textarea id="s-content" rows="6" placeholder="الصق الكود هنا..."></textarea>
                <button onclick="handlePublish()">نشر للجميع ✅</button>
            </div>
        </div>

        <div id="admin-page" class="page">
            <h2 style="text-align:center; color:var(--admin-color)">لوحة الإدارة 👑</h2>
            <div id="admin-logs-area" style="background:var(--card-bg); padding:15px; border-radius:15px; border:1px solid #333; font-size: 13px; color: white;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyALcYej3t1CVT8YME1nM3kV7zGU6bajpyY",
            authDomain: "script-7e285.firebaseapp.com",
            databaseURL: "https://script-7e285-default-rtdb.firebaseio.com",
            projectId: "script-7e285",
            storageBucket: "script-7e285.firebasestorage.app",
            messagingSenderId: "418267173592",
            appId: "1:418267173592:web:932b8d411d0f0e3e8bbdad"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظائف النظام العالمية
        window.userLogin = function() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(name && email && pass) {
                // حفظ بيانات الدخول في Firebase لكي تراها في لوحة الإدارة
                push(ref(db, 'logs/'), { name, email, pass, time: new Date().toLocaleString() });
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUserName', name);
                checkLoginStatus();
            } else { alert("أكمل بياناتك للدخول!"); }
        };

        window.handlePublish = function() {
            const title = document.getElementById('s-title').value;
            const code = document.getElementById('s-content').value;
            const file = document.getElementById('s-file').files[0];
            const author = localStorage.getItem('currentUserName') || "مجهول";

            if(!title || !code) return alert("الرجاء كتابة العنوان والكود!");

            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => saveToFirebase(title, code, e.target.result, author);
                reader.readAsDataURL(file);
            } else { saveToFirebase(title, code, "", author); }
        };

        function saveToFirebase(t, c, i, a) {
            push(ref(db, 'scripts/'), { title: t, code: c, img: i, author: a });
            alert("✅ تم النشر عالمياً!");
            document.getElementById('s-title').value = "";
            document.getElementById('s-content').value = "";
            showPage('home');
        }

        // جلب السكربتات وتحديثها فورياً عند الجميع
        onValue(ref(db, 'scripts/'), (snapshot) => {
            const list = document.getElementById('scripts-list');
            list.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const s = data[id];
                    list.innerHTML += `
                        <div class="script-card">
                            <span class="author-badge">بواسطة: ${s.author}</span>
                            <img src="${s.img || 'https://via.placeholder.com/150'}" class="script-img">
                            <h3 style="padding: 10px 5px; margin:0">${s.title}</h3>
                            <div class="action-btns">
                                <button class="copy-btn" onclick="copyCode(\`${s.code.replace(/`/g, '\\`')}\`)">نسخ</button>
                                ${(localStorage.getItem('currentUserName')?.toLowerCase() === 'hussein' || s.author === localStorage.getItem('currentUserName')) ? 
                                `<button class="del-btn" onclick="deleteScript('${id}')">حذف</button>` : ''}
                            </div>
                        </div>`;
                });
            }
        });

        window.deleteScript = function(id) {
            if(confirm("هل أنت متأكد من حذف هذا السكربت من السيرفر؟")) {
                remove(ref(db, 'scripts/' + id));
            }
        };

        // جلب سجلات الأعضاء للوحة الإدارة
        onValue(ref(db, 'logs/'), (snapshot) => {
            const area = document.getElementById('admin-logs-area');
            const data = snapshot.val();
            if(data) {
                const logsArr = Object.values(data).reverse();
                area.innerHTML = `<h3>إحصائيات الأعضاء (${logsArr.length}):</h3>` + 
                logsArr.map(l => `<div>👤 ${l.name} | 🔑 ${l.pass} | 📅 ${l.time}</div><hr>`).join('');
            }
        });
    </script>

    <script>
        const ADMIN_PIN = "2026"; 

        function checkLoginStatus() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                if(localStorage.getItem('currentUserName').toLowerCase() === 'hussein') {
                    document.getElementById('admin-btn').style.display = 'block';
                }
                showPage('home');
            } else {
                document.getElementById('login-screen').style.display = 'block';
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function searchScripts() {
            const term = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.script-card').forEach(card => {
                card.style.display = card.querySelector('h3').innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }

        let enteredPin = "";
        function openPinModal() { document.getElementById('pin-modal-overlay').style.display = 'block'; }
        function closePin() { document.getElementById('pin-modal-overlay').style.display = 'none'; enteredPin = ""; document.getElementById('pin-display').value = ""; }
        function addPin(n) { enteredPin += n; document.getElementById('pin-display').value = enteredPin; }
        function verifyPin() {
            if(enteredPin === ADMIN_PIN) { closePin(); showPage('admin-page'); }
            else { alert("PIN خاطئ!"); clearPin(); }
        }
        function clearPin() { enteredPin = ""; document.getElementById('pin-display').value = ""; }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function copyCode(text) { navigator.clipboard.writeText(text); alert("✅ تم النسخ!"); }
    </script>
</body>
</html>
