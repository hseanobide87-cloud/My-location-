<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="googlea25513e694d287f4" />
    
    <title>HusseinGUI_91</title>
    <style>
        :root {
            --main-color: #007bff; /* الأزرق الملكي */
            --bg-overlay: rgba(0, 0, 0, 0.7); /* طبقة تعتيم لكي تظهر الأزرار */
            --card-bg: rgba(17, 17, 17, 0.85); /* شفافية خفيفة للكروت */
            --text-main: #ffffff;
            --text-sec: #999;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: black;
            
            /* تنسيق الصورة كخلفية ثابتة */
            background-image: url('/storage/emulated/0/Pictures/Screenshots/Screenshot_20260412-221712~2.png'); /* اسم الملف الذي سترفعه */
            background-size: cover; /* تجعل الصورة تغطي الشاشة بالكامل */
            background-position: center; /* تمركز الصورة */
            background-attachment: fixed; /* الصورة لا تتحرك مع التمرير */
            position: relative;
        }

        /* طبقة تظليل فوق الصورة لضمان وضوح النصوص والأزرار */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); /* درجة التعتيم */
            z-index: 0;
        }

        #login-screen, #main-content {
            position: relative;
            z-index: 1; /* لكي تظهر فوق التعتيم */
        }

        #login-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--main-color);
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.4);
            width: 320px;
            text-align: center;
            backdrop-filter: blur(5px); /* تأثير ضبابي خلف النافذة */
        }

        #main-content {
            display: none;
            width: 95%;
            max-width: 1200px;
            padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .script-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .script-card:hover {
            border-color: var(--main-color);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.5);
        }

        .script-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            filter: grayscale(20%);
        }

        .btn-copy {
            background: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            padding: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-copy:hover {
            background: var(--main-color);
            color: #fff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            color: #fff;
            text-align: center;
        }

        .login-btn {
            background: var(--main-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--main-color)">اهلا بك في الموقع</h2>
        <input type="text" id="username" placeholder="أدخل اسمك">
        <button class="login-btn" onclick="startHub()">دخول</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h1 style="color:var(--main-color)">SCRIPT HUB</h1>
            <p>المشغل: <span id="op-name" style="color:var(--main-color)"></span></p>
        </div>

        <div class="scripts-grid">
            
            <div class="script-card">
                <img src="https://i.ytimg.com/vi/qV1D6V6x6fM/maxresdefault.jpg" class="script-image">
                <div style="padding:15px">
                    <span style="color:var(--main-color); font-weight:bold; display:block; margin-bottom:8px">c00lgui v3rx</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/MiRw3b/c00lgui-v3rx/main/c00lguiv3rx.lua\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://i.ytimg.com/vi/OatfS2f9Vf0/maxresdefault.jpg" class="script-image">
                <div style="padding:15px">
                    <span style="color:var(--main-color); font-weight:bold; display:block; margin-bottom:8px">Zyad AFK Script</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/zyad71810-afk/a9eaa9dd774e28b62edec5087dd4ca64/raw/34bc55cae7f274ef81c6961f6b95e51cb526e04f/gistfile1.txt\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://i.ytimg.com/vi/t4A_oR3iB6Q/maxresdefault.jpg" class="script-image">
                <div style="padding:15px">
                    <span style="color:var(--main-color); font-weight:bold; display:block; margin-bottom:8px">Axom Executor Script</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/adamowaissi22-boop/Axom/refs/heads/main/Axom%20excuter%20script\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://img.youtube.com/vi/w68LpA9b7fE/0.jpg" class="script-image">
                <div style="padding:15px">
                    <span style="color:var(--main-color); font-weight:bold; display:block; margin-bottom:8px">RC7 CLASSIC</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/CoreGui/Scripts/main/RC7\'))()')">COPY SCRIPT</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function startHub() {
            const user = document.getElementById('username').value;
            if(user.length > 0) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('op-name').innerText = user.toUpperCase();
                document.body.style.alignItems = 'flex-start';
            }
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("تم نسخ السكربت بنجاح!");
        }
    </script>
</body>
</html>
