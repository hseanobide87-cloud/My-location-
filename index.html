<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع شخصيات</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg-color: #050505; --card-bg: #111111; --primary-rgb: #ff0000; }
        @keyframes rgb-glow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 3rem; animation: rgb-text 4s infinite linear; }
        @keyframes rgb-text { 0% { color: #ff0000; } 50% { color: #00ff00; } 100% { color: #ff0000; } }

        /* ميزة 2: عداد الزوار */
        .visitor-count { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; display: inline-block; margin-bottom: 20px; }

        /* ميزة 3: البحث والتصفية */
        .controls { width: 95%; max-width: 1200px; margin: 0 auto 30px auto; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-bar { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; min-width: 250px; }
        .filter-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; cursor: pointer; }
        .filter-btn.active { border-color: #00ff00; color: #00ff00; }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 95%; max-width: 1200px; margin: 0 auto; }
        .item-card { background: var(--card-bg); border: 2px solid; border-radius: 15px; padding: 15px; animation: rgb-glow 5s infinite linear; position: relative; }
        .item-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        
        /* ميزة 15: التوقيت */
        .timestamp { font-size: 0.75rem; color: #666; display: block; margin-bottom: 10px; }

        .trade-label { font-size: 0.9rem; color: #aaa; margin-top: 5px; }
        .wanted { color: #00ff00; font-weight: bold; font-size: 1.2rem; }

        /* ميزة 7: التعليقات */
        .comment-section { margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; text-align: right; }
        .comment-list { max-height: 80px; overflow-y: auto; font-size: 0.85rem; color: #ccc; margin-bottom: 5px; }
        .comment-input { width: 100%; padding: 5px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }

        /* ميزة 1: الإشعارات */
        #notification { fixed; bottom: 20px; left: 20px; padding: 15px 25px; border-radius: 10px; background: #111; border-left: 5px solid #00ff00; display: none; z-index: 1000; animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        #admin-panel { display: none; background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 450px; margin: 20px auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { background: white; color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .admin-trigger { margin-top: 50px; color: #0a0a0a; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>اهلا وسهلا بك</h1>
        <div class="visitor-count">المتصلون الآن: <span id="v-count">1</span></div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن شخصية أو عنصر..." onkeyup="filterItems()">
        <button class="filter-btn active" onclick="setFilter('الكل')">الكل</button>
        <button class="filter-btn" onclick="setFilter('شخصيات')">شخصيات</button>
        <button class="filter-btn" onclick="setFilter('أسلحة')">أسلحة</button>
    </div>

    <div class="container" id="main-store"></div>

    <div id="notification"></div>

    <div class="admin-trigger" onclick="openVault()">.</div>

    <div id="admin-panel">
        <h2 style="color: #00ff00; text-align: center;">إدارة السحابة</h2>
        <input type="file" id="p-image" accept="image/*" onchange="previewImage(this)">
        <select id="p-category">
            <option value="شخصيات">شخصيات</option>
            <option value="أسلحة">أسلحة</option>
            <option value="أخرى">أخرى</option>
        </select>
        <input type="text" id="p-have" placeholder="ماذا تملك؟">
        <input type="text" id="p-want" placeholder="ماذا تطلب؟">
        <button class="btn" style="background: #00ff00;" onclick="publish()">نشر 🚀</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALcYej3t1CVT8YME1nM3kV7zGU6bajpyY",
            authDomain: "script-7e285.firebaseapp.com",
            databaseURL: "https://script-7e285-default-rtdb.firebaseio.com",
            projectId: "script-7e285",
            storageBucket: "script-7e285.firebasestorage.app",
            messagingSenderId: "418267173592",
            appId: "1:418267173592:web:932b8d411d0f0e3e8bbdad",
            measurementId: "G-SPRX07KF5N"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedImageData = "";
        let currentFilter = 'الكل';
        let isAdmin = false;

        // ميزة 2: عداد زوار بسيط (عشوائي للمحاكاة أو ربطه بـ Firebase)
        document.getElementById('v-count').innerText = Math.floor(Math.random() * 10) + 1;

        // ميزة 1: نظام الإشعارات
        function notify(msg) {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.style.display = 'block';
            setTimeout(() => { n.style.display = 'none'; }, 3000);
        }

        database.ref('trades').on('value', (snapshot) => {
            renderStore(snapshot);
        });

        function renderStore(snapshot) {
            const store = document.getElementById('main-store');
            store.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                if (currentFilter === 'الكل' || data.category === currentFilter) {
                    displayTrade(data, child.key);
                }
            });
        }

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => { selectedImageData = e.target.result; notify("تم تجهيز الصورة!"); };
            reader.readAsDataURL(input.files[0]);
        }

        function publish() {
            const have = document.getElementById('p-have').value;
            const want = document.getElementById('p-want').value;
            const cat = document.getElementById('p-category').value;
            if(have && want && selectedImageData) {
                database.ref('trades').push({
                    have, want, category: cat, image: selectedImageData,
                    time: new Date().toLocaleString('ar-EG') // ميزة 15
                }).then(() => {
                    notify("تم النشر بنجاح!");
                    document.getElementById('admin-panel').style.display = 'none';
                });
            }
        }

        function displayTrade(data, key) {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <span class="timestamp">📅 ${data.time || 'منذ وقت طويل'}</span>
                <img src="${data.image}"
                <div class="wanted">${data.want}</div>
                <div class="comment-section">
                    <div class="comment-list" id="comments-${key}"></div>
                    <input type="text" class="comment-input" placeholder="اكتب تعليق..." onkeypress="addComment(event, '${key}')">
                </div>
                ${isAdmin ? `<button onclick="deleteTrade('${key}')" style="background:red; color:white; border:none; width:100%; margin-top:10px; cursor:pointer;">حذف</button>` : ''}
            `;
            document.getElementById('main-store').prepend(card);
            loadComments(key);
        }

        // ميزة 7: التعليقات
        function addComment(e, key) {
            if(e.key === 'Enter' && e.target.value) {
                database.ref('comments/' + key).push(e.target.value);
                e.target.value = "";
                notify("تمت إضافة التعليق");
            }
        }

        function loadComments(key) {
            database.ref('comments/' + key).on('value', (snap) => {
                const list = document.getElementById('comments-'+key);
                list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `<div>• ${c.val()}</div>`;
                });
            });
        }

        // ميزة 3: الفلترة والبحث
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            database.ref('trades').once('value', renderStore);
        }

        function filterItems() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.item-card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(val) ? 'block' : 'none';
            });
        }

        function openVault() {
            if(prompt("Code:") === "admin111") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                notify("مرحباً بك يا زعيم");
                database.ref('trades').once('value', renderStore);
            }
        }

        function deleteTrade(key) {
            if(confirm("حذف؟")) { database.ref('trades/'+key).remove(); database.ref('comments/'+key).remove(); }
        }
    </script>
</body>
</html>
