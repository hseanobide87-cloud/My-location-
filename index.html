<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="google-site-verification" content="googlea25513e694d287f4" />
    <title>HusseinMod | Ultimate Hub</title>
    <style>
        :root {
            --main-color: #ff0000;
            --bg-dark: #050505;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-sec: #999;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #login-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--main-color);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            width: 320px;
            text-align: center;
        }

        #main-content {
            display: none;
            width: 95%;
            max-width: 1200px;
            padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .script-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .script-card:hover {
            border-color: var(--main-color);
            transform: translateY(-5px);
        }

        .script-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            filter: grayscale(30%);
        }

        .script-details {
            padding: 15px;
        }

        .script-title {
            color: var(--main-color);
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 8px;
            display: block;
        }

        .btn-copy {
            background: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            padding: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-copy:hover {
            background: var(--main-color);
            color: #fff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            text-align: center;
        }

        .login-btn {
            background: var(--main-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:red">🔱 HUSSEIN MOD 🔱</h2>
        <input type="text" id="username" placeholder="أدخل اسمك">
        <button class="login-btn" onclick="startHub()">دخول</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h1 style="color:red">🔱 HUSSEIN SCRIPT HUB 🔱</h1>
            <p>المشغل: <span id="op-name" style="color:red"></span></p>
        </div>

        <div class="scripts-grid">
            
            <div class="script-card">
                <img src="https://i.ytimg.com/vi/qV1D6V6x6fM/maxresdefault.jpg" class="script-image">
                <div class="script-details">
                    <span class="script-title">c00lgui v3rx</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/MiRw3b/c00lgui-v3rx/main/c00lguiv3rx.lua\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://i.ytimg.com/vi/OatfS2f9Vf0/maxresdefault.jpg" class="script-image">
                <div class="script-details">
                    <span class="script-title">Zyad AFK Script</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://gist.githubusercontent.com/zyad71810-afk/a9eaa9dd774e28b62edec5087dd4ca64/raw/34bc55cae7f274ef81c6961f6b95e51cb526e04f/gistfile1.txt\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://i.ytimg.com/vi/t4A_oR3iB6Q/maxresdefault.jpg" class="script-image">
                <div class="script-details">
                    <span class="script-title">Axom Executor Script</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/adamowaissi22-boop/Axom/refs/heads/main/Axom%20excuter%20script\'))()')">COPY SCRIPT</button>
                </div>
            </div>

            <div class="script-card">
                <img src="https://img.youtube.com/vi/w68LpA9b7fE/0.jpg" class="script-image">
                <div class="script-details">
                    <span class="script-title">RC7 CLASSIC</span>
                    <button class="btn-copy" onclick="copy('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/CoreGui/Scripts/main/RC7\'))()')">COPY SCRIPT</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function startHub() {
            const user = document.getElementById('username').value;
            if(user.length > 0) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('op-name').innerText = user.toUpperCase();
                document.body.style.alignItems = 'flex-start';
            }
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("تم نسخ السكربت بنجاح!");
        }
    </script>
</body>
</html>
