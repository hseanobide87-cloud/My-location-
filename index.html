<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HusseinMod Global</title>
    <style>
        :root { --main: #007bff; --bg: #000; --card: #151515; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        .navbar { background: #0a0a0a; padding: 15px; border-bottom: 2px solid var(--main); position: sticky; top: 0; display: flex; justify-content: space-around; }
        .nav-link { cursor: pointer; font-weight: bold; color: var(--main); }
        .container { padding: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; }
        button { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .script-item { background: var(--card); margin: 10px 0; padding: 15px; border-radius: 10px; border-right: 5px solid var(--main); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-link" onclick="showPage('home')">الرئيسية</div>
        <div class="nav-link" onclick="showPage('publish')">نشر سكربت</div>
    </div>

    <div class="container">
        <div id="home" class="page">
            <h2>السكربتات العالمية 🌍</h2>
            <div id="list">جاري التحميل...</div>
        </div>

        <div id="publish" class="page" style="display:none;">
            <div class="card">
                <h3>انشر سكربت جديد</h3>
                <input type="text" id="title" placeholder="اسم السكربت">
                <textarea id="code" rows="5" placeholder="ضع الكود هنا"></textarea>
                <button onclick="publish()">نشر الآن ✅</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // بيانات الربط الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyALcYej3t1CVT8YME1nM3kV7zGU6bajpyY",
            authDomain: "script-7e285.firebaseapp.com",
            databaseURL: "https://script-7e285-default-rtdb.firebaseio.com",
            projectId: "script-7e285",
            storageBucket: "script-7e285.firebasestorage.app",
            messagingSenderId: "418267173592",
            appId: "1:418267173592:web:932b8d411d0f0e3e8bbdad"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة النشر
        window.publish = function() {
            const t = document.getElementById('title').value;
            const c = document.getElementById('code').value;
            if(t && c) {
                push(ref(db, 'global_scripts/'), { title: t, code: c });
                alert("تم النشر بنجاح!");
                showPage('home');
            }
        };

        // عرض السكربتات عند الجميع
        onValue(ref(db, 'global_scripts/'), (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            if(snap.exists()) {
                Object.values(snap.val()).reverse().forEach(s => {
                    list.innerHTML += `
                        <div class="script-item">
                            <h4>${s.title}</h4>
                            <button onclick="copy('${s.code.replace(/\n/g, '\\n')}')">نسخ الكود</button>
                        </div>`;
                });
            } else { list.innerHTML = "لا توجد سكربتات بعد."; }
        });

        window.showPage = function(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        window.copy = function(text) {
            navigator.clipboard.writeText(text);
            alert("✅ تم النسخ!");
        };
    </script>
</body>
</html>
